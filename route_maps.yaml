  mcp_tags: ["Students entrypoints"]

- methods: ["GET"]
  pattern: "^/api/StudentRequestActions/$"
  mcp_type: TOOL
  tags: ["StudentRequestAction"]
  mcp_tags: ["Student request actions entrypoints"]

- methods: ["GET"]
  pattern: "^/api/StudentPeriodRegistrations/$"
  mcp_type: TOOL
