# Route maps for Universis MCP Server
# Controls which OpenAPI endpoints become MCP tools.
# First match wins. Default fallback is TOOL.
# 
# Format:
#   methods: HTTP method(s) or "*" for all
#   pattern: Python regex matched against the raw path
#   mcp_type: TOOL, RESOURCE, RESOURCE_TEMPLATE, or EXCLUDE
#   tags: FastMCP tags
#   mcp_tags: MCP protocol tags

# ─── Collection endpoints (list) ─────────────────────────────────────
- methods: ["GET"]
  pattern: "^/api/AcademicPeriods/$"
  mcp_type: TOOL
  tags: ["AcademicPeriod"]
  mcp_tags: ["Academic periods entrypoints"]

- methods: ["GET"]
  pattern: "^/api/AcademicYears/$"
  mcp_type: TOOL
  tags: ["AcademicYear"]
  mcp_tags: ["Academic years entrypoints"]

- methods: ["GET"]
