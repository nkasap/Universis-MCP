  mcp_tags: ["Students entrypoints"]

# ─── Pattern: all Student* collections ─────────────────────────────
- methods: ["GET"]
  pattern: "^/api/Student[^/]+/?$"
  mcp_type: TOOL

# ─── Fallback: exclude everything else ──────────────────────────────
- methods: "*"
  pattern: ".*"
  mcp_type: EXCLUDE
